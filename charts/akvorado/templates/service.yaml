apiVersion: v1
kind: Service
metadata:
  name: {{ include "akvorado.fullname" . }}
  labels:
    {{- include "akvorado.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8055
      protocol: TCP
      name: http
  selector:
    {{- include "akvorado.selectorLabels" . | nindent 4 }}
