annotations:
  category: Network-Visualizer
  images: |
    - name: apache-exporter
      image: docker.io/bitnami/apache-exporter:1.0.10-debian-12-r9
    - name: os-shell
      image: docker.io/bitnami/os-shell:12-debian-12-r46
    - name: wordpress
      image: docker.io/bitnami/wordpress:6.8.1-debian-12-r4
  licenses: BSD License
apiVersion: v2
appVersion: 1.11.5
dependencies:
- name: kafka
  version: "~32.2.12"
  repository: oci://registry-1.docker.io/bitnamicharts
  condition: kafka.enabled
- name: redis
  version: "~19.6.4"
  repository: oci://registry-1.docker.io/bitnamicharts
  condition: redis.enabled
- name: clickhouse
  version: "~9.2.7"
  repository: oci://registry-1.docker.io/bitnamicharts
  condition: clickhouse.enabled
type: application
description: |
  A Helm chart for installing akvorado on Kubernetes.
  Akvorado is a flow collector, enricher and visualizer
home: https://github.com/akvorado
keywords:
- application
- blog
- cms
- http
- php
- web
- wordpress
icon: https://avatars.githubusercontent.com/u/113047722
maintainers:
- name: Kaminot LLC, All Rights Reserved.
  url: https://github.com/Kaminot
name: akvorado
sources:
  - https://github.com/Kaminot/helm-charts
  - https://github.com/akvorado/akvorado.git
version: 0.0.1
